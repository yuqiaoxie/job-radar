name: Daily Job Radar

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  run-job-radar:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      MAIL_IMAP_HOST: ${{ secrets.MAIL_IMAP_HOST || 'imap.163.com' }}
      MAIL_IMAP_PORT: ${{ secrets.MAIL_IMAP_PORT || '993' }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run job-radar pipeline
        run: python -m job_radar.pipeline

      - name: Upload Excel report
        uses: actions/upload-artifact@v4
        with:
          name: daily-jobs
          path: daily_jobs.xlsx
          if-no-files-found: error

      - name: Upload scored jobs audit CSV
        uses: actions/upload-artifact@v4
        with:
          name: jobs-scored
          path: data/jobs_scored.csv
          if-no-files-found: error
