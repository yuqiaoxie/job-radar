name: Daily Job Radar

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  run-job-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run job-radar pipeline
        run: python -m job_radar.pipeline

      - name: Upload Excel report
        uses: actions/upload-artifact@v4
        with:
          name: daily-jobs
          path: daily_jobs.xlsx
          if-no-files-found: error

      - name: Upload scored jobs audit CSV
        uses: actions/upload-artifact@v4
        with:
          name: jobs-scored
          path: data/jobs_scored.csv
          if-no-files-found: error
